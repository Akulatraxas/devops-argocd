apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patchesStrategicMerge:
  - ingress-patch.yml

images:
  - name: ghcr.io/akulatraxas/local-webapp-demo-frontend
    newTag: INITIAL
  - name: ghcr.io/akulatraxas/local-webapp-demo-backend
    newTag: INITIAL

configMapGenerator:
  - name: backend-config
    literals:
      - APP_ENV=test
