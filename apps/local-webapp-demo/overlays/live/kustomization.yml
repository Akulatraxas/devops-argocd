apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: webapp-demo-live

resources:
- ../../base
- sealed-secret.yml

images:
- name: ghcr.io/akulatraxas/local-webapp-demo-backend
  newName: ghcr.io/akulatraxas/local-webapp-demo-backend
  newTag: 6e4345bdfca46c24df13fe507a76a8147a4def7c
- name: ghcr.io/akulatraxas/local-webapp-demo-frontend
  newName: ghcr.io/akulatraxas/local-webapp-demo-frontend
  newTag: 6e4345bdfca46c24df13fe507a76a8147a4def7c

configMapGenerator:
- literals:
  - APP_ENV=live
  - APP_STATE="DRAGON RAWR in Live"
  name: backend-config

patches:
- target:
    kind: Ingress
    name: webapp-ingress
  path: ingress-patch.yml
