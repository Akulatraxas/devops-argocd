apiVersion: v1
kind: Secret
metadata:
  name: backend-secret-legacy
type: Opaque
stringData:
  API_KEY: supersecret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/akulatraxas/local-webapp-demo-backend
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secret-legacy
        env:
        - name: AKUDESIRES
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: AKUDESIRES
        - name: AKU_FROM_INFISICAL
          valueFrom:
            secretKeyRef:
              name: infi-ef-test
              key: AKU_SECRET_STASH
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8000
