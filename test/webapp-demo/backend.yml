apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: webapp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/akulatraxas/local-webapp-demo-backend:7d1777a2b05dce17cec24d80078a2948092a9f45
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: webapp-demo
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8000
